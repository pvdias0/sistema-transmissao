<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay Sistema de Transmissao</title>
    <link rel="stylesheet" href="/overlay/assets/overlay.css" />
  </head>
  <body>
    <main class="overlay-shell">
      <div class="debug-empty-state is-hidden" id="debug-empty-state">
        <p class="debug-empty-title">Overlay ativo</p>
        <p class="debug-empty-text">Nenhum item no ar e nenhuma enquete ativa neste momento.</p>
      </div>

      <section class="live-layer" id="live-layer">
        <article class="live-card is-hidden" id="live-card">
          <div class="live-card-header">
            <p class="live-kicker">WhatsApp ao vivo</p>
            <p class="live-author" id="live-author"></p>
          </div>

          <div class="live-media-region" id="live-media-region"></div>
          <p class="live-message" id="live-message"></p>
        </article>
      </section>

      <aside class="poll-layer is-hidden" id="poll-layer">
        <div class="poll-card">
          <p class="poll-kicker">Enquete ativa</p>
          <h2 class="poll-title" id="poll-title"></h2>
          <div class="poll-options" id="poll-options"></div>
          <p class="poll-meta" id="poll-meta"></p>
        </div>
      </aside>
    </main>

    <script type="module" src="/overlay/assets/overlay.js"></script>
  </body>
</html>
